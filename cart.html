<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>JLOODNA Cart</title>

  <link rel="stylesheet" href="cart.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

  <!-- HEADER -->

  <header class="header">

    <div class="logo">
      JLOODNA
    </div>

    <nav class="nav">
      <a href="#">Akèy</a>
      <a href="#">Boutik</a>
      <a href="#">Sou Nou</a>
      <a href="#">Kontak</a>
    </nav>

  </header>

  <!-- CART SECTION -->

  <section class="cart-section">

    <!-- LEFT -->

    <div class="cart-products">

      <h1>Panyen Mwen</h1>

      <div id="cart-items">

      </div>

    </div>

    <!-- RIGHT -->

    <div class="cart-summary">

      <h2>Rezime Lòd la</h2>

      <div class="summary-line">
        <span>Sous-total :</span>
        <strong id="subtotal">
          $0
        </strong>
      </div>

      <div class="summary-line">
        <span>Livrezon :</span>
        <strong id="shipping">
          $15
        </strong>
      </div>

      <div class="summary-total">
        <span>Total :</span>
        <strong id="total">
          $0
        </strong>
      </div>

      <a href="checkout.html"
      class="checkout-btn">
        PASER KÒMAND LAN
      </a>

    </div>

  </section>

  <script src="cart.js"></script>

</body>
</html>
